<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kenko">
<meta name="theme-color" content="#F0F2F5">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<title>Kenko</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#F0F2F5;
  --card:#fff;
  --border:#E2E6EE;
  --text:#1A1A1A;
  --text-mid:#4A5465;
  --text-soft:#748297;
  --accent:#FF5924;
  --accent-light:#FFF0EB;
  --accent-dark:#E55020;
  --warm:#FFE926;
  --warm-light:#FFFCE6;
  --rose:#FF7DD3;
  --radius:18px;
  --shadow:0px 4px 22px rgb(116 130 151 / 14%);
}

html{font-size:16px;-webkit-text-size-adjust:100%}

body{
  font-family:'Inter',-apple-system,system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.55;
  min-height:100dvh;
  overscroll-behavior:none;
  padding-bottom:env(safe-area-inset-bottom,20px);
}

.app{max-width:480px;margin:0 auto;padding:0 16px}

/* Header */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 4px 16px;
}

header h1{
  font-size:1.35rem;font-weight:700;letter-spacing:-.02em;color:var(--accent);
  font-family:'Nunito',-apple-system,system-ui,sans-serif;
}

.week-nav{display:flex;gap:6px;align-items:center;justify-content:center;margin-bottom:16px}

.week-nav button{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:var(--card);
  font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-mid);transition:all .15s;
}

.week-nav button:active{background:var(--accent-light)}
.week-nav button:disabled{opacity:.25;cursor:default}

.week-label{
  font-size:.72rem;color:var(--text-soft);
  font-family:inherit;
  min-width:60px;text-align:center;
}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}

.tab{
  flex:1;padding:10px 0;text-align:center;
  font-family:'Nunito',inherit;font-size:.78rem;font-weight:600;color:var(--text-soft);
  background:none;border:none;border-bottom:3px solid transparent;
  cursor:pointer;transition:all .2s;letter-spacing:.03em;
}

.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Views */
.view{display:none}
.view.active{display:block}

/* FAB add button */
.fab-add{
  position:fixed;bottom:28px;right:max(16px,calc((100% - 480px)/2 + 16px));
  width:56px;height:56px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;
  font-size:2rem;font-weight:300;
  cursor:pointer;z-index:30;
  box-shadow:0 6px 20px rgba(255,89,36,.35);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,opacity .15s;
  padding:0;padding-bottom:2px;
}
.fab-add:active{transform:scale(.92)}

#cameraInput{display:none}

/* Capture panel (slides up from bottom) */
.capture-panel{
  position:fixed;inset:0;z-index:35;
  display:none;flex-direction:column;justify-content:flex-end;
  background:rgba(0,0,0,.3);
}
.capture-panel.active{display:flex}

.capture-panel-inner{
  background:var(--card);
  border-radius:20px 20px 0 0;
  max-width:480px;width:100%;margin:0 auto;
  max-height:85dvh;overflow-y:auto;
  animation:panelUp .3s ease;
}

@keyframes panelUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.capture-panel .photo-preview{
  position:relative;aspect-ratio:4/3;background:#E8EBF0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

.capture-panel .photo-preview img{width:100%;height:100%;object-fit:cover}

.retake-btn{
  position:absolute;top:10px;right:10px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,.45);border:none;color:#fff;
  font-size:.85rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* Scales */
.scales{padding:16px 18px;display:flex;flex-direction:column;gap:14px}

.scale-row{display:flex;align-items:center;gap:10px}

.scale-label{font-size:.76rem;color:var(--text-mid);min-width:78px;flex-shrink:0}

.scale-opts{display:flex;gap:6px;flex:1}

.scale-btn{
  flex:1;padding:9px 0;border-radius:12px;
  border:1px solid var(--border);background:var(--card);
  font-family:inherit;font-size:.82rem;
  color:var(--text-mid);cursor:pointer;transition:all .15s;text-align:center;
}

.scale-btn .sub{font-size:.6rem;color:var(--text-soft);display:block;margin-top:1px}

.scale-btn.selected{
  border-color:var(--accent);background:var(--accent-light);color:var(--accent);
  box-shadow:0 0 2px 1px var(--accent);
}

.scale-btn.selected .sub{color:var(--accent)}
.scale-btn:active{transform:scale(.96)}

/* Voice note row */
.voice-row{display:flex;gap:8px;padding:0 18px 16px;align-items:flex-end}

.voice-row textarea{
  flex:1;font-family:inherit;font-size:.84rem;
  border:1px solid var(--border);border-radius:12px;
  padding:10px 13px;resize:none;min-height:42px;max-height:100px;
  line-height:1.4;color:var(--text);background:var(--bg);
}

.voice-row textarea:focus{outline:none;border-color:var(--accent)}
.voice-row textarea::placeholder{color:var(--text-soft);font-style:italic}


/* Save button */
.save-btn{
  width:calc(100% - 36px);margin:0 18px 10px;padding:14px;
  border-radius:28px;border:none;background:var(--accent);color:#fff;
  font-family:'Nunito',inherit;font-size:.9rem;font-weight:600;cursor:pointer;
  letter-spacing:.02em;transition:all .15s;
  box-shadow:0px 8px 16px rgba(255,89,36,0.2);
}

.save-btn:active{transform:scale(.98);opacity:.9}
.save-btn:disabled{opacity:.35;cursor:default}

/* Cancel button */
.cancel-edit-btn{
  width:calc(100% - 36px);margin:0 18px 18px;padding:16px;
  border-radius:28px;border:1px solid var(--border);
  background:var(--card);color:var(--text-soft);
  font-family:'Nunito',inherit;font-size:.88rem;font-weight:600;
  cursor:pointer;text-align:center;transition:all .15s;
  min-height:52px;
}
.cancel-edit-btn:active{background:var(--accent-light)}

/* Hunger summary card */
.hunger-summary{
  background:var(--card);border-radius:var(--radius);
  padding:16px 20px;margin-bottom:20px;
  box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:space-between;
}
.hunger-summary-label{
  font-size:.62rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;color:var(--text-soft);
}
.hunger-summary-pct{
  font-size:1.6rem;font-weight:700;color:var(--accent);
  font-family:'Nunito',inherit;letter-spacing:-.02em;
}

/* Today's meal feed */
.today-feed h2{
  font-size:.72rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;color:var(--text-soft);margin-bottom:12px;padding:0 4px;
}

.meal-card{
  background:var(--card);border:none;
  border-radius:var(--radius);overflow:hidden;margin-bottom:14px;
  animation:slideUp .35s ease;
  box-shadow:var(--shadow);
  cursor:pointer;transition:box-shadow .15s;
}
.meal-card:active{box-shadow:0 0 0 2px var(--accent)}
.meal-card.editing{box-shadow:0 0 0 2px var(--accent)}

@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.meal-card-photo{aspect-ratio:4/3;background:#E8EBF0;overflow:hidden}
.meal-card-photo img{width:100%;height:100%;object-fit:cover}

.meal-card-info{padding:12px 14px;display:flex;flex-direction:column;gap:5px}

.meal-card-time{
  font-size:.68rem;color:var(--text-soft);
  font-family:inherit;
}

.meal-card-note{font-size:.82rem;color:var(--text);line-height:1.45;font-style:italic}

.meal-card-scales{
  display:flex;gap:14px;font-size:.72rem;color:var(--text-mid);
  font-family:inherit;
}

.meal-card-scales span{display:flex;align-items:center;gap:4px}

.no-photo-card{padding:14px}

.empty-state{
  text-align:center;padding:48px 20px;
  color:var(--text-soft);font-style:italic;font-size:.86rem;line-height:1.6;
}

/* Week view */
.day-group{margin-bottom:24px}

.day-header{
  font-size:.74rem;font-weight:600;color:var(--text-soft);
  text-transform:uppercase;letter-spacing:.06em;
  padding:0 4px 10px;
  font-family:inherit;
}

.day-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;
}

.grid-card{
  background:var(--card);border:none;
  border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow);
  cursor:pointer;transition:box-shadow .15s;
}
.grid-card:active{box-shadow:0 0 0 2px var(--accent)}

.grid-card-photo{aspect-ratio:1;background:#E8EBF0;overflow:hidden}
.grid-card-photo img{width:100%;height:100%;object-fit:cover}

.grid-card-meta{
  padding:8px 10px;font-size:.66rem;color:var(--text-mid);
  font-family:inherit;
  display:flex;justify-content:space-between;
}

.grid-card-no-photo{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:.76rem;color:var(--text-soft);font-style:italic;
  padding:12px;text-align:center;line-height:1.4;
}

.week-empty{
  text-align:center;padding:60px 20px;
  color:var(--text-soft);font-style:italic;font-size:.86rem;
}

/* Settings */
.settings-view{padding:20px 4px}
.settings-view h2{font-size:.9rem;font-weight:400;color:var(--text);margin-bottom:16px}

.setting-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 0;border-bottom:1px solid var(--border);
  font-size:.84rem;color:var(--text-mid);
}

.setting-item button{
  font-family:inherit;font-size:.78rem;font-weight:600;padding:8px 16px;
  border-radius:28px;border:1px solid var(--border);
  background:var(--card);color:var(--text-mid);cursor:pointer;
}

.setting-item button:active{background:var(--accent-light)}
.setting-item .danger{color:var(--rose);border-color:var(--rose)}

.settings-note{
  text-align:center;color:var(--text-soft);
  font-size:.72rem;font-style:italic;padding:20px 0 0;
}

/* Metrics */
.period-toggle{
  display:flex;gap:0;
  background:var(--card);border:none;
  border-radius:30px;overflow:hidden;margin-bottom:20px;
  box-shadow:var(--shadow);
}

.period-btn{
  flex:1;padding:9px 0;
  font-family:inherit;font-size:.74rem;
  color:var(--text-soft);background:none;border:none;
  cursor:pointer;transition:all .15s;letter-spacing:.02em;
}

.period-btn.active{
  background:var(--accent-light);color:var(--accent);font-weight:600;
}

.metric-card{
  background:var(--card);border:none;
  border-radius:var(--radius);padding:20px;margin-bottom:14px;
  box-shadow:var(--shadow);
}

.metric-title{
  font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;
  color:var(--text-soft);margin-bottom:14px;
  font-family:inherit;font-weight:600;
}

.metric-visual{
  display:flex;align-items:center;justify-content:center;
  min-height:64px;margin-bottom:10px;
}

.metric-label{
  font-size:.82rem;color:var(--text);text-align:center;line-height:1.5;
}

.metric-sub{
  font-size:.72rem;color:var(--text-soft);text-align:center;
  margin-top:3px;font-style:italic;
}

.metric-empty{
  font-size:.8rem;color:var(--text-soft);font-style:italic;
  text-align:center;padding:8px 0;
}

/* Comparison bars */
.comp-bars{display:flex;gap:20px;align-items:flex-end;justify-content:center;width:100%}

.comp-bar-group{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:140px}

.comp-bar-track{
  width:100%;height:8px;background:var(--border);border-radius:4px;overflow:hidden;
}

.comp-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}

.comp-bar-label{
  font-size:.66rem;color:var(--text-soft);text-align:center;
  font-family:inherit;
}

.comp-bar-val{
  font-size:.82rem;color:var(--text);font-weight:500;
  font-family:inherit;
}

/* Dot row for meals per day */
.dot-row{display:flex;gap:8px;align-items:flex-end;justify-content:center}

.dot-col{display:flex;flex-direction:column;align-items:center;gap:4px}

.dot-circle{border-radius:50%;background:var(--accent);opacity:.7;transition:all .3s}

.dot-day-label{
  font-size:.58rem;color:var(--text-soft);
  font-family:inherit;
}

/* Time-of-day zones */
.time-zones{display:flex;width:100%;gap:2px;height:56px;align-items:flex-end}

.time-zone{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;gap:3px;
  border-radius:8px;padding:6px 4px;min-height:56px;
}

.time-zone-morning{background:#FFF5EB}
.time-zone-afternoon{background:#EEFBEE}
.time-zone-evening{background:#EEEDF6}

.time-dots{display:flex;flex-wrap:wrap;gap:3px;justify-content:center}

.time-dot{
  width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.6;
}

.time-zone-label{
  font-size:.58rem;color:var(--text-soft);margin-top:4px;
  font-family:inherit;
}

/* Toast */
.toast{
  position:fixed;
  bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--accent);color:#fff;
  font-family:inherit;font-weight:600;
  font-size:.82rem;letter-spacing:.02em;
  padding:12px 24px;border-radius:28px;
  opacity:0;pointer-events:none;
  transition:all .35s ease;
  z-index:40;
  box-shadow:0px 8px 16px rgba(255,89,36,0.2);
}

.toast.visible{
  opacity:1;transform:translateX(-50%) translateY(0);
}

/* Dialog */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.3);
  display:none;align-items:center;justify-content:center;z-index:50;
}

.overlay.visible{display:flex}

.dialog{
  background:#fff;border-radius:20px;padding:26px 22px;
  max-width:300px;width:88%;text-align:center;
  box-shadow:var(--shadow);
}

.dialog p{font-size:.88rem;margin-bottom:18px;line-height:1.5;color:var(--text)}
.dialog-btns{display:flex;gap:10px}

.dialog-btns button{
  flex:1;font-family:inherit;font-size:.82rem;font-weight:600;padding:11px;
  border-radius:28px;border:1px solid var(--border);cursor:pointer;
}

.dialog-btns .cancel{background:#fff;color:var(--text-soft)}
.dialog-btns .confirm{background:var(--accent);color:#fff;border-color:var(--accent)}

@media(max-width:360px){
  html{font-size:14px}
  .day-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Kenko</h1>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="today">Today</button>
    <button class="tab" data-tab="week">Week</button>
    <button class="tab" data-tab="metrics">Metrics</button>
    <button class="tab" data-tab="settings">More</button>
  </div>

  <div class="week-nav" id="weekNav" style="display:none">
    <button id="prevWeek">‹</button>
    <span class="week-label" id="weekLabel"></span>
    <button id="nextWeek">›</button>
  </div>

  <!-- TODAY -->
  <div class="view active" id="todayView">
    <input type="file" id="cameraInput" accept="image/*" capture="environment">
    <button class="fab-add" id="addMealBtn">+</button>

    <div class="hunger-summary" id="hungerSummary" style="display:none">
      <span class="hunger-summary-label">Eaten when hungry</span>
      <span class="hunger-summary-pct" id="hungerSummaryPct">--</span>
    </div>

    <div class="today-feed" id="todayFeed"></div>

    <!-- Capture / edit panel -->
    <div class="capture-panel" id="capturePanel">
      <div class="capture-panel-inner">
        <div class="photo-preview" id="photoPreview">
          <img id="previewImg" alt="Meal photo">
          <button class="retake-btn" id="retakeBtn">✕</button>
        </div>
        <div class="scales">
          <div class="scale-row">
            <div class="scale-label">Hungry?</div>
            <div class="scale-opts" data-scale="hunger">
              <button class="scale-btn" data-val="1">1<span class="sub">not really</span></button>
              <button class="scale-btn" data-val="2">2<span class="sub">somewhat</span></button>
              <button class="scale-btn" data-val="3">3<span class="sub">starving</span></button>
            </div>
          </div>
          <div class="scale-row">
            <div class="scale-label">Satisfied?</div>
            <div class="scale-opts" data-scale="satisfaction">
              <button class="scale-btn" data-val="1">1<span class="sub">meh</span></button>
              <button class="scale-btn" data-val="2">2<span class="sub">good</span></button>
              <button class="scale-btn" data-val="3">3<span class="sub">perfect</span></button>
            </div>
          </div>
        </div>
        <div class="voice-row">
          <textarea id="noteInput" rows="1" placeholder="Optional note…"></textarea>
        </div>
        <button class="save-btn" id="saveBtn">Save Meal</button>
        <button class="cancel-edit-btn" id="cancelEditBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- WEEK -->
  <div class="view" id="weekView"></div>

  <!-- METRICS -->
  <div class="view" id="metricsView">
    <div class="period-toggle">
      <button class="period-btn active" data-days="7">7 days</button>
      <button class="period-btn" data-days="30">30 days</button>
      <button class="period-btn" data-days="365">1 year</button>
    </div>
    <div id="metricsCards"></div>
  </div>

  <!-- SETTINGS -->
  <div class="view" id="settingsView">
    <div class="settings-view">
      <h2>Settings</h2>
      <div class="setting-item">
        <span>Export this week</span>
        <button id="exportBtn">CSV</button>
      </div>
      <div class="setting-item">
        <span>Clear all data</span>
        <button class="danger" id="clearAllBtn">Clear</button>
      </div>
      <p class="settings-note">Photos stay in this app — never saved to your camera roll.</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <p id="dialogMsg"></p>
    <div class="dialog-btns">
      <button class="cancel" id="dialogCancel">Cancel</button>
      <button class="confirm" id="dialogConfirm">Yes</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   IndexedDB — photos + meals, no camera roll
   ══════════════════════════════════════════ */
const DB='kenko', VER=1;
let db=null;

function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB,VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('meals')){
        const s=d.createObjectStore('meals',{keyPath:'id',autoIncrement:true});
        s.createIndex('date','date',{unique:false});
      }
    };
    r.onsuccess=e=>{db=e.target.result;res(db)};
    r.onerror=e=>rej(e);
  });
}

function dbAdd(meal){
  return new Promise((res,rej)=>{
    const tx=db.transaction('meals','readwrite');
    tx.objectStore('meals').add(meal).onsuccess=e=>res(e.target.result);
    tx.onerror=e=>rej(e);
  });
}

function dbRange(s,e){
  return new Promise((res,rej)=>{
    const tx=db.transaction('meals','readonly');
    const req=tx.objectStore('meals').index('date').getAll(IDBKeyRange.bound(s,e));
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e);
  });
}

function dbClear(){
  return new Promise((res,rej)=>{
    const tx=db.transaction('meals','readwrite');
    tx.objectStore('meals').clear().onsuccess=()=>res();
    tx.onerror=e=>rej(e);
  });
}

function dbPut(meal){
  return new Promise((res,rej)=>{
    const tx=db.transaction('meals','readwrite');
    tx.objectStore('meals').put(meal).onsuccess=e=>res(e.target.result);
    tx.onerror=e=>rej(e);
  });
}

function dbGet(id){
  return new Promise((res,rej)=>{
    const tx=db.transaction('meals','readonly');
    const req=tx.objectStore('meals').get(id);
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e);
  });
}

/* ══════════════════════════════════════════
   Helpers
   ══════════════════════════════════════════ */
const localDateStr=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const today=()=>localDateStr(new Date());
const fmtTime=iso=>new Date(iso).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};

function fmtDayLabel(ds){
  const d=new Date(ds+'T12:00:00'), t=today();
  const y=new Date();y.setDate(y.getDate()-1);
  if(ds===t) return 'Today';
  if(ds===localDateStr(y)) return 'Yesterday';
  return d.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'});
}

function weekRange(off){
  const now=new Date(), day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-((day+6)%7)+(off*7));
  mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return{
    start:localDateStr(mon),
    end:localDateStr(sun),
    label:mon.toLocaleDateString([],{month:'short',day:'numeric'})+' – '+
          sun.toLocaleDateString([],{month:'short',day:'numeric'})
  };
}

const hLabels={1:'not hungry',2:'somewhat',3:'starving'};
const sLabels={1:'meh',2:'good',3:'perfect'};

/* Read file directly as base64, then compress via canvas */
function showPanel(){capturePanel.classList.add('active')}
function hidePanel(){capturePanel.classList.remove('active')}

camIn.addEventListener('change',e=>{
  const f=e.target.files[0];
  if(!f)return;

  const reader=new FileReader();
  reader.onload=function(ev){
    const img=new Image();
    img.onload=function(){
      try{
        const c=document.createElement('canvas');
        let w=img.width,h=img.height;
        const maxDim=800;
        if(w>h&&w>maxDim){h=Math.round(h*(maxDim/w));w=maxDim}
        else if(h>maxDim){w=Math.round(w*(maxDim/h));h=maxDim}
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        /* Use toDataURL — works reliably on iOS Safari unlike toBlob */
        photoB64=c.toDataURL('image/jpeg',0.7);
        prevImg.src=photoB64;
        showPanel();
      }catch(err){
        /* Fallback: use original file as-is */
        photoB64=ev.target.result;
        prevImg.src=photoB64;
        showPanel();
      }
    };
    img.onerror=function(){
      /* If Image() fails, use raw base64 */
      photoB64=ev.target.result;
      prevImg.src=photoB64;
      showPanel();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(f);
});

/* ══════════════════════════════════════════
   Scales
   ══════════════════════════════════════════ */
let hunger=null, satisfaction=null;

document.querySelectorAll('.scale-opts').forEach(g=>{
  const sc=g.dataset.scale;
  g.querySelectorAll('.scale-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const v=+btn.dataset.val;
      // Toggle off if same
      if(sc==='hunger'&&hunger===v){hunger=null;btn.classList.remove('selected');return}
      if(sc==='satisfaction'&&satisfaction===v){satisfaction=null;btn.classList.remove('selected');return}
      g.querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      if(sc==='hunger')hunger=v; else satisfaction=v;
    });
  });
});

const noteIn=document.getElementById('noteInput');
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
noteIn.addEventListener('input',()=>autoR(noteIn));

   Toast

let toastTimer=null;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('visible'),2200);

/* ══════════════════════════════════════════
   Edit helpers
   ══════════════════════════════════════════ */
function resetForm(){
  photoB64=null;
  prevImg.src='';camIn.value='';
  noteIn.value='';autoR(noteIn);
  hunger=null;satisfaction=null;
  document.querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('selected'));
  editingMeal=null;
  document.getElementById('saveBtn').textContent='Save Meal';
}

function cancelEdit(){
  resetForm();
  hidePanel();
}

function startEdit(meal){
  editingMeal=meal;
  // Photo
  if(meal.photo){
    photoB64=meal.photo;
    prevImg.src=meal.photo;
  }else{
    photoB64=null;
    prevImg.src='';
    camIn.value='';
  }
  // Hunger
  hunger=meal.hunger;
  document.querySelectorAll('[data-scale="hunger"] .scale-btn').forEach(b=>{
    b.classList.toggle('selected',hunger!==null&&+b.dataset.val===hunger);
  });
  // Satisfaction
  satisfaction=meal.satisfaction;
  document.querySelectorAll('[data-scale="satisfaction"] .scale-btn').forEach(b=>{
    b.classList.toggle('selected',satisfaction!==null&&+b.dataset.val===satisfaction);
  });
  // Note
  noteIn.value=meal.note||'';
  autoR(noteIn);
  // UI
  document.getElementById('saveBtn').textContent='Update Meal';
  showPanel();
}

/* Cancel button */
document.getElementById('cancelEditBtn').addEventListener('click',cancelEdit);

/* ══════════════════════════════════════════
   Save meal
   ══════════════════════════════════════════ */
document.getElementById('saveBtn').addEventListener('click',async()=>{
  /* Allow save if ANY input was given: photo, scale, or note */
  if(!photoB64&&!noteIn.value.trim()&&hunger===null&&satisfaction===null)return;

  if(editingMeal){
    const meal={
      id:editingMeal.id,
      date:editingMeal.date,
      time:editingMeal.time,
      photo:photoB64||null,
      hunger,satisfaction,
      note:noteIn.value.trim()||null
    };
    try{ await dbPut(meal) }catch(err){ console.error('Update failed',err);return }
    showToast('Meal updated ✓');
  }else{
    const meal={
      date:today(),
      time:new Date().toISOString(),
      photo:photoB64||null,
      hunger,satisfaction,
      note:noteIn.value.trim()||null
    };
    try{ await dbAdd(meal) }catch(err){ console.error('Save failed',err);return }
    showToast('Meal logged ✓');
  }

  cancelEdit();
  renderToday();
  if(document.getElementById('weekView').classList.contains('active')) renderWeek();
});

/* ══════════════════════════════════════════
   Render today + recent days
   ══════════════════════════════════════════ */
async function renderToday(){
  const todayDate=today();
  // Get today's meals
  const todayMeals=await dbRange(todayDate,todayDate);

  // Update hunger summary card (last 7 days)
  const summaryStart=new Date();summaryStart.setDate(summaryStart.getDate()-6);
  const allRecent=await dbRange(localDateStr(summaryStart),todayDate);
  const withHunger=allRecent.filter(m=>m.hunger!==null&&m.hunger!==undefined);
  const summaryEl=document.getElementById('hungerSummary');
  if(withHunger.length>0){
    const hungry=withHunger.filter(m=>m.hunger>=2).length;
    const pct=Math.round((hungry/withHunger.length)*100);
    document.getElementById('hungerSummaryPct').textContent=pct+'%';
    summaryEl.style.display='flex';
  }else{
    summaryEl.style.display='none';
  }

  // Get last 6 days before today for recent section
  const recentStart=new Date();recentStart.setDate(recentStart.getDate()-6);
  const recentStartStr=localDateStr(recentStart);
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yesterdayStr=localDateStr(yesterday);
  const recentMeals=await dbRange(recentStartStr,yesterdayStr);

  const feed=document.getElementById('todayFeed');
  let html='';

  // Today's meals
  if(todayMeals.length){
    const sorted=[...todayMeals].reverse();
    html+='<h2>Today</h2>'+sorted.map(m=>renderMealCard(m)).join('');
  } else {
    html+='<div class="empty-state">No meals yet today.<br>Snap a photo when you eat.</div>';
  }

  // Recent days
  if(recentMeals.length){
    const grouped={};
    recentMeals.forEach(m=>{if(!grouped[m.date])grouped[m.date]=[];grouped[m.date].push(m)});
    const dates=Object.keys(grouped).sort().reverse();

    html+='<div style="margin-top:28px">';
    html+='<h2>Recent</h2>';
    dates.forEach(date=>{
      const label=fmtDayLabel(date);
      const dayMeals=grouped[date];
      html+=`<div style="font-size:.68rem;color:var(--text-soft);font-family:-apple-system,system-ui,sans-serif;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px 4px">${label}</div>`;
      dayMeals.reverse().forEach(m=>{ html+=renderMealCard(m) });
    });
    html+='</div>';
  }

  feed.innerHTML=html;
}

function renderMealCard(m){
  const time=fmtTime(m.time);
  const ht=m.hunger?`🍽 ${hLabels[m.hunger]}`:'';
  const st=m.satisfaction?`✦ ${sLabels[m.satisfaction]}`:'';

  if(m.photo){
    return`<div class="meal-card" data-meal-id="${m.id}">
      <div class="meal-card-photo"><img src="${m.photo}" alt="" loading="lazy"></div>
      <div class="meal-card-info">
        <div class="meal-card-time">${time}</div>
        ${m.note?`<div class="meal-card-note">${esc(m.note)}</div>`:''}
        <div class="meal-card-scales">${ht?`<span>${ht}</span>`:''}${st?`<span>${st}</span>`:''}</div>
      </div>
    </div>`;
  }
  return`<div class="meal-card no-photo-card" data-meal-id="${m.id}"><div class="meal-card-info">
    <div class="meal-card-time">${time}</div>
    ${m.note?`<div class="meal-card-note">${esc(m.note)}</div>`:''}
    <div class="meal-card-scales">${ht?`<span>${ht}</span>`:''}${st?`<span>${st}</span>`:''}</div>
  </div></div>`;
}

/* ══════════════════════════════════════════
   Render week
   ══════════════════════════════════════════ */
let wOff=0;

async function renderWeek(){
  const r=weekRange(wOff);
  document.getElementById('weekLabel').textContent=r.label;
  document.getElementById('nextWeek').disabled=(wOff>=0);

  const meals=await dbRange(r.start,r.end);
  const wv=document.getElementById('weekView');

  if(!meals.length){wv.innerHTML='<div class="week-empty">No meals this week.</div>';return}

  const grouped={};
  meals.forEach(m=>{if(!grouped[m.date])grouped[m.date]=[];grouped[m.date].push(m)});
  const dates=Object.keys(grouped).sort().reverse();

  wv.innerHTML=dates.map(date=>{
    const dm=grouped[date];
    return`<div class="day-group">
      <div class="day-header">${fmtDayLabel(date)}</div>
      <div class="day-grid">${dm.map(m=>{
        const ht=m.hunger?`🍽${m.hunger}`:'';
        const st=m.satisfaction?`✦${m.satisfaction}`:'';
        if(m.photo){
          return`<div class="grid-card" data-meal-id="${m.id}">
            <div class="grid-card-photo"><img src="${m.photo}" alt="" loading="lazy"></div>
            <div class="grid-card-meta"><span>${fmtTime(m.time)}</span><span>${ht} ${st}</span></div>
          </div>`;
        }
        return`<div class="grid-card" data-meal-id="${m.id}">
          <div class="grid-card-no-photo">${m.note?esc(m.note).slice(0,60):'No photo'}</div>
          <div class="grid-card-meta"><span>${fmtTime(m.time)}</span><span>${ht} ${st}</span></div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════
   Metrics
   ══════════════════════════════════════════ */
let metricsDays=7;

document.querySelectorAll('.period-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    metricsDays=+btn.dataset.days;
    renderMetrics();
  });
});

function dateNDaysAgo(n){
  const d=new Date();d.setDate(d.getDate()-(n-1));
  return localDateStr(d);
}

async function renderMetrics(){
  const startDate=dateNDaysAgo(metricsDays);
  const endDate=today();
  const meals=await dbRange(startDate,endDate);
  const container=document.getElementById('metricsCards');

  if(!meals.length){
    container.innerHTML='<div class="metric-empty" style="padding:60px 20px">No meals in this period yet.<br>Start logging to see insights.</div>';
    return;
  }

  const withHunger=meals.filter(m=>m.hunger!==null&&m.hunger!==undefined);
  const withSat=meals.filter(m=>m.satisfaction!==null&&m.satisfaction!==undefined);

  let html='';

  /* 1. % eaten when hungry (hunger >= 2) */
  html+=renderHungerPercent(withHunger);

  /* 2. Average satisfaction */
  html+=renderAvgSatisfaction(withSat);

  /* 3. Hunger → satisfaction insight */
  html+=renderHungerSatInsight(meals);

  /* 4. Meals per day (dot row — last 7 actual days regardless of period) */
  html+=renderMealsPerDay(meals,metricsDays);

  /* 5. Time of day pattern */
  html+=renderTimeOfDay(meals);

  container.innerHTML=html;
}

function renderHungerPercent(withHunger){
  if(withHunger.length<1) return mCard('Eaten when hungry','<div class="metric-empty">Rate hunger on meals to see this</div>');
  const hungry=withHunger.filter(m=>m.hunger>=2).length;
  const pct=Math.round((hungry/withHunger.length)*100);
  const angle=pct/100*360;

  // SVG ring
  const r=30,stroke=7,cx=38,cy=38;
  const circ=2*Math.PI*r;
  const dashLen=circ*(pct/100);

  const svg=`<svg width="76" height="76" viewBox="0 0 76 76">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#E2E6EE" stroke-width="${stroke}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#FF5924" stroke-width="${stroke}"
      stroke-dasharray="${dashLen} ${circ}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray .5s ease"/>
    <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle"
      font-family="-apple-system,system-ui,sans-serif" font-size="13" fill="#1A1A1A" font-weight="500">${pct}%</text>
  </svg>`;

  return mCard('Eaten when hungry',
    `<div class="metric-visual">${svg}</div>
     <div class="metric-label">${hungry} of ${withHunger.length} rated meals</div>
     <div class="metric-sub">when hunger was 2 or 3</div>`);
}

function renderAvgSatisfaction(withSat){
  if(withSat.length<1) return mCard('Average satisfaction','<div class="metric-empty">Rate satisfaction on meals to see this</div>');
  const avg=withSat.reduce((s,m)=>s+m.satisfaction,0)/withSat.length;
  const pct=((avg-1)/2)*100; // 1=0%, 3=100% along the spectrum

  const svg=`<svg width="200" height="40" viewBox="0 0 200 40">
    <line x1="20" y1="20" x2="180" y2="20" stroke="#E2E6EE" stroke-width="4" stroke-linecap="round"/>
    <circle cx="20" cy="20" r="5" fill="${avg<1.3?'#FF5924':'#FFD4C4'}" opacity="${avg<1.3?1:.5}"/>
    <circle cx="100" cy="20" r="5" fill="${avg>=1.3&&avg<2.5?'#FF5924':'#FFD4C4'}" opacity="${avg>=1.3&&avg<2.5?1:.5}"/>
    <circle cx="180" cy="20" r="5" fill="${avg>=2.5?'#FF5924':'#FFD4C4'}" opacity="${avg>=2.5?1:.5}"/>
    <circle cx="${20+pct*1.6}" cy="20" r="8" fill="#FF5924" stroke="#fff" stroke-width="2" style="transition:cx .4s ease"/>
    <text x="20" y="36" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="9" fill="#748297">meh</text>
    <text x="100" y="36" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="9" fill="#748297">good</text>
    <text x="180" y="36" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="9" fill="#748297">perfect</text>
  </svg>`;

  return mCard('Average satisfaction',
    `<div class="metric-visual">${svg}</div>
     <div class="metric-label">${avg.toFixed(1)} average across ${withSat.length} meals</div>`);
}

function renderHungerSatInsight(meals){
  const hungryMeals=meals.filter(m=>m.hunger>=2&&m.satisfaction!=null);
  const notHungryMeals=meals.filter(m=>m.hunger===1&&m.satisfaction!=null);

  if(hungryMeals.length<2||notHungryMeals.length<2){
    return mCard('Hunger → satisfaction',
      '<div class="metric-empty">Not enough data yet — keep rating both hunger and satisfaction</div>');
  }

  const avgHungry=hungryMeals.reduce((s,m)=>s+m.satisfaction,0)/hungryMeals.length;
  const avgNot=notHungryMeals.reduce((s,m)=>s+m.satisfaction,0)/notHungryMeals.length;

  const maxW=100;
  const hW=Math.max(10,Math.round((avgHungry/3)*maxW));
  const nW=Math.max(10,Math.round((avgNot/3)*maxW));

  return mCard('Hunger → satisfaction',
    `<div class="comp-bars">
      <div class="comp-bar-group">
        <div class="comp-bar-val">${avgHungry.toFixed(1)}</div>
        <div class="comp-bar-track"><div class="comp-bar-fill" style="width:${hW}%;background:var(--accent)"></div></div>
        <div class="comp-bar-label">when hungry</div>
      </div>
      <div class="comp-bar-group">
        <div class="comp-bar-val">${avgNot.toFixed(1)}</div>
        <div class="comp-bar-track"><div class="comp-bar-fill" style="width:${nW}%;background:var(--warm)"></div></div>
        <div class="comp-bar-label">when not hungry</div>
      </div>
    </div>
    <div class="metric-sub" style="margin-top:12px">${
      avgHungry>avgNot+0.2?'You tend to enjoy meals more when you eat hungry.'
      :avgNot>avgHungry+0.2?'Interestingly, you seem just as satisfied eating when not very hungry.'
      :'About the same either way — no strong pattern.'
    }</div>`);
}

function renderMealsPerDay(meals,periodDays){
  // Show last 7 calendar days as dots regardless of period
  const showDays=Math.min(periodDays,7);
  const days=[];
  for(let i=showDays-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=localDateStr(d);
    const dayLabel=d.toLocaleDateString([],{weekday:'narrow'});
    const count=meals.filter(m=>m.date===ds).length;
    days.push({ds,dayLabel,count});
  }

  const totalDaysInPeriod=periodDays;
  // Group meals by date for average
  const dateSet=new Set(meals.map(m=>m.date));
  const daysWithMeals=dateSet.size;
  const avg=meals.length/Math.min(totalDaysInPeriod, Math.max(daysWithMeals,1));

  const maxCount=Math.max(...days.map(d=>d.count),1);

  const dots=days.map(d=>{
    const size=d.count===0?6:Math.max(10,Math.min(28,8+(d.count/maxCount)*20));
    const opacity=d.count===0?0.15:0.3+0.7*(d.count/maxCount);
    return`<div class="dot-col">
      <div class="dot-circle" style="width:${size}px;height:${size}px;opacity:${opacity}"></div>
      <div class="dot-day-label">${d.dayLabel}</div>
    </div>`;
  }).join('');

  return mCard('Meals per day',
    `<div class="metric-visual"><div class="dot-row">${dots}</div></div>
     <div class="metric-label">${avg.toFixed(1)} meals/day average</div>
     <div class="metric-sub">${meals.length} total meals over the period</div>`);
}

function renderTimeOfDay(meals){
  const morning=meals.filter(m=>{const h=new Date(m.time).getHours();return h<12}).length;
  const afternoon=meals.filter(m=>{const h=new Date(m.time).getHours();return h>=12&&h<17}).length;
  const evening=meals.filter(m=>{const h=new Date(m.time).getHours();return h>=17}).length;
  const total=morning+afternoon+evening;
  if(!total) return mCard('When you eat','<div class="metric-empty">Log some meals to see patterns</div>');

  const maxDots=15;
  function dots(n){
    const scaled=Math.max(0,Math.min(maxDots,Math.round((n/total)*maxDots*3)));
    return Array(scaled).fill('<div class="time-dot"></div>').join('');
  }

  const peak=morning>=afternoon&&morning>=evening?'morning':afternoon>=evening?'afternoon':'evening';

  return mCard('When you eat',
    `<div class="metric-visual" style="width:100%">
      <div class="time-zones">
        <div class="time-zone time-zone-morning">
          <div class="time-dots">${dots(morning)}</div>
          <div class="time-zone-label">morning</div>
        </div>
        <div class="time-zone time-zone-afternoon">
          <div class="time-dots">${dots(afternoon)}</div>
          <div class="time-zone-label">afternoon</div>
        </div>
        <div class="time-zone time-zone-evening">
          <div class="time-dots">${dots(evening)}</div>
          <div class="time-zone-label">evening</div>
        </div>
      </div>
    </div>
    <div class="metric-sub">Most meals in the ${peak}</div>`);
}

function mCard(title,inner){
  return`<div class="metric-card">
    <div class="metric-title">${title}</div>
    ${inner}
  </div>`;
}

/* ══════════════════════════════════════════
   Export CSV
   ══════════════════════════════════════════ */
document.getElementById('exportBtn').addEventListener('click',async()=>{
  const r=weekRange(0);
  const meals=await dbRange(r.start,r.end);
  if(!meals.length){showDialog('Nothing to export this week.',null);return}
  const rows=[['Date','Time','Hunger (1-3)','Satisfaction (1-3)','Note']];
  meals.forEach(m=>rows.push([m.date,fmtTime(m.time),m.hunger||'',m.satisfaction||'',m.note||'']));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download=`kenko-${r.start}.csv`;a.click();
  URL.revokeObjectURL(u);
});

/* ══════════════════════════════════════════
   Clear all
   ══════════════════════════════════════════ */
document.getElementById('clearAllBtn').addEventListener('click',()=>{
  showDialog('Clear all meal data and photos? This can\'t be undone.',async()=>{
    await dbClear();renderToday();
  });
});

/* ══════════════════════════════════════════
   Dialog
   ══════════════════════════════════════════ */
let confirmAction=null;

function showDialog(msg,action){
  document.getElementById('dialogMsg').textContent=msg;
  document.getElementById('overlay').classList.add('visible');
  confirmAction=action;
  if(!action){
    document.getElementById('dialogCancel').style.display='none';
    document.getElementById('dialogConfirm').textContent='OK';
  }else{
    document.getElementById('dialogCancel').style.display='';
    document.getElementById('dialogConfirm').textContent='Yes';
  }
}

function hideDialog(){document.getElementById('overlay').classList.remove('visible');confirmAction=null}

document.getElementById('dialogConfirm').addEventListener('click',()=>{if(confirmAction)confirmAction();hideDialog()});
document.getElementById('dialogCancel').addEventListener('click',hideDialog);
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)hideDialog()});

/* ══════════════════════════════════════════
   Init
   ══════════════════════════════════════════ */
(async()=>{await openDB();renderToday()})();
